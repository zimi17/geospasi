name: Permintaan Fitur
description: Usulkan ide atau peningkatan untuk Geospasi
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ceritakan ide Anda untuk Geospasi.

  - type: textarea
    id: problem
    attributes:
      label: Apa masalah yang ingin dipecahkan?
      description: Ceritakan konteks atau masalah yang Anda hadapi.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solusi yang diusulkan
      description: Bagaimana seharusnya fitur ini bekerja?
      placeholder: Tambahkan tombol X di sidebar yang melakukan Y...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatif
      description: Solusi lain yang sudah dipertimbangkan

  - type: dropdown
    id: scope
    attributes:
      label: Lingkup
      options:
        - Geospasi Core (app/)
        - GeoSERANG (contoh implementasi)
        - Dokumentasi
        - Skrip / Tooling
        - Lainnya

  - type: checkboxes
    id: terms
    attributes:
      label: Konfirmasi
      options:
        - label: Sudah mencari usulan serupa yang sudah ada
          required: true
        - label: Bersedia membantu implementasi jika memungkinkan
